<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Campus OLX</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <div class="container">
      <div class="nav-container">
        <a href="index.html" class="logo-container">
          <div class="logo-circle">CO</div>
          <h2 style="margin:0; font-weight:800;">Campus OLX</h2>
        </a>
        <nav class="nav-links">
          <a href="index.html" class="nav-btn">Home</a>
          <a href="resources.html" class="nav-btn">Resources</a>
          <a href="login.html" class="nav-btn primary">Login</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container" style="margin-top:40px;">
    <h1 style="margin-bottom:30px; color:var(--primary-color);">Admin Dashboard</h1>

    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:40px;">
      <div class="card" style="padding:25px; text-align:center;">
        <h4 style="color:#666; margin-bottom:10px;">Total Products</h4>
        <div id="totalProducts" style="font-size:2rem; font-weight:800; color:var(--primary-color);">0</div>
      </div>
      <div class="card" style="padding:25px; text-align:center;">
        <h4 style="color:#666; margin-bottom:10px;">Total Users</h4>
        <div style="font-size:2rem; font-weight:800; color:var(--primary-color);">42</div>
      </div>
      <div class="card" style="padding:25px; text-align:center;">
        <h4 style="color:#666; margin-bottom:10px;">Reports</h4>
        <div style="font-size:2rem; font-weight:800; color:orange;">3</div>
      </div>
    </div>

    <div class="card" style="padding:30px;">
      <h3 style="margin-bottom:20px; color:var(--primary-color);">Manage All Products</h3>
      <div id="admin-product-list" class="grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">
        <!-- Products with delete buttons will be injected here -->
      </div>
    </div>
  </main>

  <footer class="container">
    <p>© 2026 Campus OLX Lucknow University. All rights reserved.</p>
  </footer>

  <script src="js/script.js"></script>
  <script>
    // Admin specific logic
    function renderAdminProducts() {
      const list = document.getElementById('admin-product-list');
      const products = JSON.parse(localStorage.getItem('campus_olx_products')) || [];
      document.getElementById('totalProducts').textContent = products.length;

      if (products.length === 0) {
        list.innerHTML = "<p>No products to manage.</p>";
        return;
      }

      list.innerHTML = products.map(p => `
        <div class="card" style="padding:15px; position:relative;">
          <h4 style="font-size:0.9rem; margin-bottom:5px;">${p.title}</h4>
          <p style="font-size:0.8rem; color:#666;">₹${p.price}</p>
          <button onclick="deleteProduct(${p.id})" style="margin-top:10px; background:#ff4444; color:white; border:none; padding:5px 10px; border-radius:4px; font-size:0.75rem; cursor:pointer; width:100%;">Delete</button>
        </div>
      `).join('');
    }

    function deleteProduct(id) {
      if (confirm('Are you sure you want to delete this listing?')) {
        let products = JSON.parse(localStorage.getItem('campus_olx_products')) || [];
        products = products.filter(p => p.id !== id);
        localStorage.setItem('campus_olx_products', JSON.stringify(products));
        renderAdminProducts();
      }
    }

    document.addEventListener('DOMContentLoaded', renderAdminProducts);
  </script>
</body>
</html>
