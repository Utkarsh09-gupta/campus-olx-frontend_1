<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist — Campus OLX</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <div class="container">
      <div class="nav-container">
        <a href="index.html" class="logo-container">
          <div class="logo-circle">CO</div>
          <h2 style="margin:0; font-weight:800;">Campus OLX</h2>
        </a>
        <nav class="nav-links">
          <a href="index.html" class="nav-btn">Home</a>
          <a href="resources.html" class="nav-btn">Resources</a>
          <a href="profile.html" class="nav-btn">Profile</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container" style="margin-top:40px;">
    <h1 style="margin-bottom:30px; color:var(--primary-color);">Your Wishlist</h1>
    
    <div id="wishlist-grid" class="grid">
      <!-- Will be populated if favorites logic is added -->
      <div style="grid-column: 1/-1; text-align:center; padding:100px; background:white; border-radius:15px;">
        <div style="font-size:3rem; margin-bottom:20px;">❤️</div>
        <h3>Your wishlist is empty</h3>
        <p style="color:#666; margin-top:10px;">Save items you're interested in to view them later.</p>
        <a href="resources.html" class="cta primary" style="display:inline-block; margin-top:20px;">Browse Items</a>
      </div>
    </div>
  </main>

  <footer class="container">
    <p>© 2026 Campus OLX Lucknow University. All rights reserved.</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
