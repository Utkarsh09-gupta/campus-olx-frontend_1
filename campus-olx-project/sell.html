<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sell Item — Campus OLX</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body style="background:#f0f2f5;">
  <header>
    <div class="container">
      <div class="nav-container">
        <a href="index.html" class="logo-container">
          <div class="logo-circle">CO</div>
          <h2 style="margin:0; font-weight:800;">Campus OLX</h2>
        </a>
        <nav class="nav-links">
          <a href="index.html" class="nav-btn">Home</a>
          <a href="resources.html" class="nav-btn">Resources</a>
          <a href="profile.html" class="nav-btn">Profile</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container" style="margin-top:40px; max-width:600px;">
    <div class="card" style="padding:40px;">
      <h1 style="color:var(--primary-color); margin-bottom:10px; text-align:center;">Post a Listing</h1>
      <p style="text-align:center; color:#666; margin-bottom:40px;">Reach out to thousands of students at Lucknow University.</p>

      <form id="addListingForm" onsubmit="addProductFormHandler(event)">
        <div class="form-group">
          <label>Item Title</label>
          <input id="title" placeholder="e.g. Engineering Mathematics Volume 1" required>
          <p style="font-size:0.8rem; color:#888; margin-top:5px;">Mention the name and edition clearly.</p>
        </div>

        <div class="form-group">
          <label>Category</label>
          <select id="category">
            <option>Books</option>
            <option>Notes</option>
            <option>Stationery</option>
            <option>Equipment</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Price (₹)</label>
          <input id="price" type="number" placeholder="Enter 0 if giving for free" required>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="description" rows="5" placeholder="Condition of the item, usage duration, etc." required></textarea>
        </div>

        <div class="form-group">
          <label>Image Upload</label>
          <input type="file" id="imageInput" accept="image/*" style="padding:5px;">
          <p style="font-size:0.8rem; color:#888; margin-top:5px;">Clear photos help you sell faster!</p>
        </div>

        <button type="submit" class="btn-block" style="margin-top:20px;">List Item Now</button>
      </form>
    </div>
  </main>

  <footer class="container">
    <p>© 2026 Campus OLX Lucknow University. All rights reserved.</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
