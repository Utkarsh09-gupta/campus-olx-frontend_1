<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Campus OLX</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body style="background:#f0f2f5; display:flex; flex-direction:column; min-height:100vh;">
  <header>
    <div class="container">
      <div class="nav-container">
        <a href="index.html" class="logo-container">
          <div class="logo-circle">CO</div>
          <h2 style="margin:0; font-weight:800;">Campus OLX</h2>
        </a>
        <nav class="nav-links">
          <a href="index.html" class="nav-btn">Home</a>
          <a href="resources.html" class="nav-btn">Resources</a>
          <a href="register.html" class="nav-btn">Register</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container" style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 0;">
    <div class="form-container" style="width:100%; max-width:450px; margin:0;">
      <div style="text-align:center; margin-bottom:30px;">
        <h2 style="color:var(--primary-color); font-size:1.8rem;">Welcome Back!</h2>
        <p style="color:#666; margin-top:5px;">Login to trade within Lucknow University</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>University Email / ID</label>
          <input type="text" id="email" placeholder="e.g. student@lu.ac.in" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; font-size:0.9rem;">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" style="color:var(--accent-color); text-decoration:none; font-weight:600;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-block">Login</button>
      </form>

      <div style="text-align:center; margin-top:25px; border-top:1px solid #eee; padding-top:20px;">
        <p style="color:#666;">Don't have an account? <a href="register.html" style="color:var(--accent-color); font-weight:700; text-decoration:none;">Sign Up</a></p>
      </div>
    </div>
  </main>

  <footer class="container">
    <p>© 2026 Campus OLX Lucknow University. All rights reserved.</p>
  </footer>

  <script src="js/script.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      // Simulate login
      localStorage.setItem('campus_olx_current_user', JSON.stringify({ email, name: email.split('@')[0] }));
      alert('Login successful! Welcome to Campus OLX.');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
